steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/serveit-web:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/serveit-web:latest
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/serveit-web:$COMMIT_SHA
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/serveit-web:latest
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - serveit-web
      - --image
      - gcr.io/$PROJECT_ID/serveit-web:$COMMIT_SHA
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
images:
  - gcr.io/$PROJECT_ID/serveit-web:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/serveit-web:latest
